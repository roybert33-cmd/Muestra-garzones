<title>Cocina - Ristorante Moderno</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0e0e0e;color:#fff;min-height:100vh;padding:18px}
h1{font-size:32px;font-weight:900;letter-spacing:-1px}
.sub{color:#888;font-size:13px;margin:4px 0 18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:900px;margin:0 auto}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.col{background:#161616;border-radius:20px;padding:16px;border:1px solid #222}
.col h2{font-size:14px;letter-spacing:1.5px;color:#c9a86a;margin-bottom:12px}
.ord{background:#fff;color:#111;border-radius:16px;padding:14px;margin-bottom:10px;animation:ap .3s}
@keyframes ap{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ord strong{font-size:13px}
.ord .plato{font-size:15px;font-weight:800;margin:4px 0}
.btn{margin-top:10px;width:100%;background:#111;color:#fff;border:0;border-radius:12px;padding:10px;font-weight:800;cursor:pointer}
.vacio{color:#555;font-size:13px;text-align:center;padding:20px}
</style>
</head>
<body>

<!-- PROTECCION PIN -->
<style>
#pin-lock { position:fixed; inset:0; z-index:99999; background:#111; display:flex; align-items:center; justify-content:center; flex-direction:column; color:white; font-family:sans-serif; }
#pin-lock input { font-size:2rem; text-align:center; letter-spacing:0.5rem; padding:12px; border-radius:12px; border:2px solid #f59e0b; width:200px; margin:16px 0; }
#pin-lock button { background:#f59e0b; border:none; padding:12px 32px; border-radius:12px; font-weight:bold; font-size:1.1rem; cursor:pointer; }
#pin-error { color:#ff6b6b; height:20px; margin-top:8px; }
</style>
<div id="pin-lock">
  <h2 style="margin:0">🔒 Acceso restringido</h2>
  <p style="opacity:0.7">Ingresa el PIN del personal</p>
  <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autofocus>
  <button onclick="checkPin()">Entrar</button>
  <div id="pin-error"></div>
</div>
<script>
const CORRECT_PIN = "1784";
function checkPin(){
  const v = document.getElementById('pin-input').value;
  if(v === CORRECT_PIN){
    localStorage.setItem('rest_auth', CORRECT_PIN);
    document.getElementById('pin-lock').style.display='none';
  } else {
    document.getElementById('pin-error').textContent='PIN incorrecto';
    document.getElementById('pin-input').value='';
  }
}
(function(){
  if(localStorage.getItem('rest_auth') === CORRECT_PIN){
    const el = document.getElementById('pin-lock');
    if(el) el.style.display='none';
  }
})();
document.getElementById('pin-input').addEventListener('keyup', e => { if(e.key==='Enter') checkPin(); });
</script>
<!-- FIN PROTECCION PIN -->

<h1>👨‍🍳 COCINA</h1>
<div class="sub">Ristorante Moderno • Tiempo real</div>
<div class="grid">
  <div class="col"><h2>🔥 EN ELABORACIÓN</h2><div id="elab"><div class="vacio">Sin pedidos</div></div></div>
  <div class="col"><h2>✅ LISTOS</h2><div id="listos"><div class="vacio">Nada listo aún</div></div></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBfNhMXyx6mFTm6NBZX2IUqlYENHjukphc",authDomain:"restaurant-app-bccfa.firebaseapp.com",projectId:"restaurant-app-bccfa",storageBucket:"restaurant-app-bccfa.firebasestorage.app",messagingSenderId:"125055311821",appId:"1:125055311821:web:ffbb0cea9c5bc54ebeee84"};
const app=initializeApp(cfg);const db=getFirestore(app);
window.marcar=async(id)=>{await updateDoc(doc(db,"mesas",id),{estado:"Listo"})};
onSnapshot(collection(db,"mesas"),snap=>{
  let htmlE="", htmlL="";
  snap.forEach(d=>{
    const m=d.data(); const emoji = m.pedidoActual?.includes("Pizza")?"🍕":m.pedidoActual?.includes("Hamburguesa")?"🍔":m.pedidoActual?.includes("Tacos")?"🌮":m.pedidoActual?.includes("Ensalada")?"🥗":"🥤";
    if(m.estado==="En camino"||m.estado==="Pidiendo"){
      htmlE+=`<div class="ord"><strong>MESA ${m.numero||d.id}</strong><div class="plato">${emoji} ${m.pedidoActual}</div><button class="btn" onclick="marcar('${d.id}')">Marcar Listo →</button></div>`;
    }
    if(m.estado==="Listo"){
      htmlL+=`<div class="ord"><strong>MESA ${m.numero||d.id}</strong><div class="plato">${emoji} ${m.pedidoActual} ✅</div></div>`;
    }
  });
  document.getElementById('elab').innerHTML=htmlE||'<div class="vacio">Sin pedidos</div>';
  document.getElementById('listos').innerHTML=htmlL||'<div class="vacio">Nada listo aún</div>';
});
</script>
